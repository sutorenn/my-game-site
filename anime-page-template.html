<!-- 特集ページのひな形（コピーして data-page を変える） -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ここに説明文">
  <title>ここにSEOタイトル | アニメ特化ナビ</title>
  <link rel="stylesheet" href="anime-recommend.css">
</head>
<body data-page="ページID">
  <header class="header header--sub">
    <div class="header__inner">
      <p class="header__site"><a href="index.html">アニメ特化ナビ</a></p>
      <h1 id="page-h1" class="page-h1">h1タイトル</h1>
    </div>
  </header>
  <nav id="site-nav" class="site-nav site-nav--portal" aria-label="サイト内メニュー"></nav>
  <nav id="breadcrumb" class="breadcrumb" aria-label="パンくずリスト"></nav>
  <div class="page-lead"><p id="page-intro" class="page-intro"></p></div>
  <aside class="ad ad--top" aria-label="広告スペース（上）">
    <p class="ad__label">AD</p>
    <p class="ad__placeholder">広告スペース（728×90）</p>
  </aside>
  <main class="main main--page">
    <p class="back-to-top"><a href="index.html" class="back-to-top__link">← トップページへ戻る</a></p>
    <ol id="ranking-list" class="ranking-list"></ol>
    <section class="related" aria-labelledby="related-title">
      <h2 id="related-title" class="section-title">関連記事</h2>
      <ul id="related-list" class="related-list"></ul>
    </section>
  </main>
  <aside class="ad ad--bottom" aria-label="広告スペース（下）">
    <p class="ad__label">AD</p>
    <p class="ad__placeholder">広告スペース（728×90）</p>
  </aside>
  <footer class="footer">
    <a href="index.html" class="footer__top-link">← トップページへ戻る</a>
    <p>© アニメ特化ナビ</p>
  </footer>
  <script src="anime-pages-data.js" defer></script>
  <script src="anime-nav.js" defer></script>
  <script src="anime-seo.js" defer></script>
  <script src="anime-list-page.js" defer></script>
</body>
</html>
